{% extends 'authentication/base.html' %}

{% block page_title %}Recuperar senha{% endblock %}

{% block page_content %}
    <h1>Recuperar senha</h1>
    <p>Digite seu e-mail para receber o link de redefinição de senha.</p>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Enviar e-mail</button>
    </form>

    <p><a href="{% url 'authentication:login' %}">Voltar para o login</a></p>
{% endblock %}
