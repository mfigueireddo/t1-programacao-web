{% extends 'authentication/base.html' %}

{% block page_title %}E-mail enviado{% endblock %}

{% block page_content %}
<div class="auth-page">
    <div class="auth-card">
        <h1 class="auth-title">E-mail enviado</h1>
        <p class="auth-subtitle">
            Se existir uma conta com o e-mail informado, você receberá um link para redefinir sua senha.
        </p>

        <div class="auth-links">
            <p><a href="{% url 'authentication:login' %}">Voltar para o login</a></p>
        </div>
    </div>
</div>
{% endblock %}
