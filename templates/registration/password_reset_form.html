{% extends 'authentication/base.html' %}

{% block page_title %}Recuperar senha{% endblock %}

{% block page_content %}

<div class="auth-page">

    <div class="auth-card">

        <h1 class="auth-title">Recuperar senha</h1>
        <p class="auth-subtitle">Digite seu e-mail para receber o link de redefinição de senha.</p>

        <form method="post" class="auth-form">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="auth-button">Enviar e-mail</button>
        </form>

        <div class="auth-links">
            <p><a href="{% url 'authentication:login' %}">Voltar para o login</a></p>
        </div>

    </div> <!-- auth-card -->

</div> <!-- auth-page -->

{% endblock %}
