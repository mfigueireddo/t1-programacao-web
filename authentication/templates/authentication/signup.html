{% extends 'authentication/base.html' %}

{% load static %}

{% block page_title %}Cadastro{% endblock %}

{% block page_content %}
    <h1>Criar conta</h1>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Cadastrar</button>
    </form>

    <p>Já tem conta? <a href="{% url 'authentication:login' %}">Faça login</a></p>
{% endblock %}
