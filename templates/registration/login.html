{% extends 'base.html' %}

{% block title %}Login{% endblock %}

{% block content %}
    <h1>Entrar</h1>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Entrar</button>
    </form>

    <p>Ainda não tem conta? <a href="{% url 'signup' %}">Cadastre-se</a></p>
{% endblock %}
