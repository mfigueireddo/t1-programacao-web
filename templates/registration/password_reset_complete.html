{% extends 'authentication/base.html' %}

{% block page_title %}Senha redefinida{% endblock %}

{% block page_content %}
<div class="auth-page">
    <div class="auth-card">
        <h1 class="auth-title">Senha redefinida</h1>
        <p class="auth-subtitle">
            Sua senha foi alterada com sucesso. Agora você já pode entrar no sistema com a nova senha.
        </p>

        <div class="auth-links">
            <p><a href="{% url 'authentication:login' %}">Ir para o login</a></p>
        </div>
    </div>
</div>
{% endblock %}
