{% extends 'authentication/base.html' %}

{% block page_title %}Redefinir senha{% endblock %}

{% block page_content %}
    <h1>Redefinir senha</h1>

    {% if validlink %}
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">Salvar nova senha</button>
        </form>
    {% else %}
        <p>Este link é inválido ou já foi utilizado.</p>
    {% endif %}
{% endblock %}
